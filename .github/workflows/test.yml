name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  skill-pack:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run structural validation
        run: tests/structural/run.sh

      - name: Run trigger fixture validation
        run: tests/skill-triggering/run-all.sh
